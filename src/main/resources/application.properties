# Puerto del servidor embebido
server.port=8080

# Deshabilitar la página de error Whitelabel (usamos GlobalExceptionHandler)
server.error.whitelabel.enabled=false

# Nivel de log para el paquete del proyecto
logging.level.com.universidad=DEBUG

# Formato de fechas JSON (ISO 8601)
spring.jackson.serialization.write-dates-as-timestamps=false
